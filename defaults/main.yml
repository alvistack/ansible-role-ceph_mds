# Ceph relesae.
ceph_release: "{{ _ceph_release }}"

# Ceph version.
ceph_version: "{{ _ceph_version[ceph_release] }}"

# Ceph detected memory total (default with 8192Mi).
ceph_memtotal_mb: "{{ (((ansible_facts['memtotal_mb'] + 1023) // 1024) * 1024) | int }}"

# Ceph Metadata Server Daemon configs.
# See https://github.com/ceph/ceph/blob/main/src/common/options/mds.yaml.in
ceph_mds_config:
  - { state: present, section: mds, option: mds_cache_memory_limit, value: "{{ (ceph_memtotal_mb * (512 / 8192) * 1024 * 1024) | int }}" }  # 4Gi / 8 ~= 512Mi
  - { state: present, section: mds, option: mds_cache_reservation, value: "0.5" }  # 0.05
  - { state: present, section: mds, option: mds_cache_trim_decay_rate, value: "0.5" }  # 1
  - { state: present, section: mds, option: mds_cache_trim_threshold, value: "{{ (512 * 1024) | int }}" }  # 256Ki * 2 ~= 512Ki
  - { state: present, section: mds, option: mds_health_cache_threshold, value: "2.0" }  # 1.5
  - { state: present, section: mds, option: mds_recall_global_max_decay_threshold, value: "{{ (256 * 1024) | int }}" }  # 128Ki * 2 ~= 256Ki
  - { state: present, section: mds, option: mds_recall_max_caps, value: "{{ (64 * 1024) | int }}" }  # 30000B / 8 ~= 64Ki
  - { state: present, section: mds, option: mds_recall_max_decay_rate, value: "0.5" }  # 1.5
  - { state: present, section: mds, option: mds_recall_max_decay_threshold, value: "{{ (256 * 1024) | int }}" }  # 128Ki * 2 ~= 256Ki

# CephFS to be created.
ceph_mds_cephfs:
  - { name: cephfs, metadata: cephfs_metadata, data: cephfs_data }

# CephFS subvolume group to be created.
ceph_mds_subvolumegroup:
  - { vol_name: cephfs, group_name: csi }
